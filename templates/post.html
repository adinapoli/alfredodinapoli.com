<article class="post">
  <header>
    <h1 class="post__title">$title$</h1>
    <div class="post__meta">
      <span class="post__date">$date$</span>
      $if(tags)$
        <span class="post__tags">$tags$</span>
      $endif$
    </div>
  </header>

  <div class="post__body">
    $body$
  </div>

  <hr>
  <p class="small text-soft">
    Subscribe via the <a href="/rss.xml">RSS feed</a> for new posts.
  </p>
</article>
